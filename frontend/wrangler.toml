name = "thinkspace-canvas-agent"
main = "worker/worker.ts"
compatibility_date = "2024-12-30"
workers_dev = true
preview_urls = true

[observability]
enabled = true

[durable_objects]
bindings = [
  { name = "AGENT_DURABLE_OBJECT", class_name = "AgentDurableObject" },
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TldrawAiDurableObject"]

[[migrations]]
tag = "v2"
renamed_classes = [
  { from = "TldrawAiDurableObject", to = "AgentDurableObject" },
]