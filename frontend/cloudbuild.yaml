steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE}
      - --build-arg
      - VITE_AGENT_BACKEND_URL=${_VITE_AGENT_BACKEND_URL}
      - --build-arg
      - VITE_SESSION_API_BASE_URL=${_VITE_SESSION_API_BASE_URL}
      - --build-arg
      - VITE_TLDRAW_AGENT_STREAM_URL=${_VITE_TLDRAW_AGENT_STREAM_URL}
      - .

images:
  - ${_IMAGE}
