name: Deploy Cloudflare Worker

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-cloudflare-worker
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      GCP_PROJECT_ID: ssn-fyp
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Sync worker Google API key from Secret Manager
        run: |
          gcloud secrets versions access latest \
            --project="${GCP_PROJECT_ID}" \
            --secret=thinkspace-google-api-key \
            > /tmp/thinkspace-google-api-key
          npx wrangler secret put GOOGLE_API_KEY < /tmp/thinkspace-google-api-key
          rm -f /tmp/thinkspace-google-api-key

      - name: Deploy Cloudflare Worker
        run: npx wrangler deploy
